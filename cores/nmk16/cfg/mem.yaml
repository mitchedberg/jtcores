params:
  - { name: SPR_OFFSET, value: "22'h10_0000 >> 2" }
  - { name: FG_OFFSET, value: "22'h20_0000 >> 2" }

sdram:
  banks:
    - buses:
      - name: main
        addr_width: 18
        data_width: 16
    - buses:
      - name: oki
        addr_width: 17
        data_width: 8
    - buses:
      - name: gfx
        addr_width: 22
        data_width: 32
      - name: spr
        addr_width: 22
        data_width: 32
        offset: SPR_OFFSET
      - name: fg
        addr_width: 17
        data_width: 32
        offset: FG_OFFSET
    - buses:
      - name: ram
        addr_width: 16
        data_width: 16
        rw: true
