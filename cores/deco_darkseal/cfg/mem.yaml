params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
  - { name: SND_OFFSET, value: "(`JTFRAME_BA1_START)>>1" }
  - { name: GFX_OFFSET, value: "(`JTFRAME_BA2_START)>>2" }
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 15
        data_width: 16
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 20
        data_width: 16
    - buses:
      - name: snd
        addr_width: 17
        data_width: 8
        offset: SND_OFFSET
      - name: gfx0
        addr_width: 18
        data_width: 32
    - buses:
      - name: gfx1
        addr_width: 19
        data_width: 32
        offset: GFX_OFFSET
    - buses:
      - name: gfx3
        addr_width: 18
        data_width: 32
bram:
  - name: spr
    addr_width: 11
    data_width: 16
    dual_port: { name: main, we: spr_we, rw: true, din: ram_din, dout: ms_dout }
  - name: pal
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: mp_dout }
  - name: vram
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: vram_we, rw: true, din: ram_din, dout: mv_dout }
  - name: huc_rom
    addr_width: 16
    data_width: 8
