params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 17
        data_width: 16
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 20
        data_width: 16
    - buses:
      - name: snd
        addr_width: 15
        data_width: 8
      - name: snd2
        addr_width: 12
        data_width: 8
bram:
  - name: pal
    addr_width: 10
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: mp_dout }
