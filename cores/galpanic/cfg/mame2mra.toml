[global]
author=["community"]

[parse]
sourcefile=[ "galpanic.cpp" ]

[buttons]
names=[
    { names="Button 1,Button 2" }
]

[dipsw]
delete=[{names=["Unused","Unknown"]}]

[ROM]
regions = [
    { name="maincpu", width=16, reverse=true, no_offset=true },
    { name="oki", start="JTFRAME_BA1_START" },
    { name="gfx1", start="JTFRAME_BA2_START", width=16, no_offset=true },
    { name="gfx2", start="JTFRAME_BA3_START", width=32, no_offset=true }
]

order = [
    "maincpu", "oki", "gfx1", "gfx2"
]
