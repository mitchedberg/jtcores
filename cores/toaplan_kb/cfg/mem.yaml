params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 17
        data_width: 16
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 19
        data_width: 16
    - buses:
      - name: snd
        addr_width: 15
        data_width: 8
      - name: adpcm
        addr_width: 18
        data_width: 8
    - buses:
      - name: tile0
        addr_width: 21
        data_width: 32
      - name: tile1
        addr_width: 21
        data_width: 32
bram:
  - name: pal
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: pal_dout }
  - name: vram
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: vram_we, rw: true, din: ram_din, dout: vram_dout }
  - name: obj
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: obj_we, rw: true, din: ram_din, dout: obj_dout }
