sdram:
  banks:
    - buses:
      - name: main
        addr_width: 20
        data_width: 16
    - buses:
      - name: snd
        addr_width: 17
        data_width: 8
      - name: gfx0
        addr_width: 18
        data_width: 8
      - name: gfx1
        addr_width: 18
        data_width: 8
    - buses:
      - name: gfx2
        addr_width: 18
        data_width: 8
      - name: gfx3
        addr_width: 18
        data_width: 8
bram:
  - name: ram
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: ram_we, rw: true, din: ram_din, dout: ram_dout }
  - name: spr
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: spr_we, rw: true, din: ram_din, dout: spr_dout }
  - name: pal
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: pal_dout }
