[global]
author=["community"]

[parse]
sourcefile=[ "rohga.cpp" ]

[buttons]
names=[
    { names="Fire 1,Fire 2,Fire 3" }
]

[dipsw]
delete=[{names=["Unused","Unknown"]}]

[ROM]
regions = [
    { name="maincpu", width=16, reverse=true, no_offset=true },
    { name="audiocpu", start="JTFRAME_BA1_START" },
    { name="ymsnd:adpcma", start="JTFRAME_BA2_START" },
    { name="ymsnd:adpcmb", start="JTFRAME_BA3_START" },
    { name="gfx1", width=16, no_offset=true },
    { name="gfx2", width=16, no_offset=true }
]

order = [
    "maincpu", "audiocpu", "ymsnd:adpcma", "ymsnd:adpcmb", "gfx1", "gfx2"
]
