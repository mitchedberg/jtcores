[global]
author=["community"]

[parse]
sourcefile=[ "cabal.cpp" ]

[buttons]
names=[
    { names="Fire,Bomb,Trackball" }
]

[dipsw]
delete=[{names=["Unused","Unknown"]}]

[ROM]
regions = [
    { name="maincpu", width=16, reverse=true, no_offset=true },
    { name="audiocpu", start="JTFRAME_BA1_START" },
    { name="gfx1", start="JTFRAME_BA2_START", width=16, no_offset=true },
    { name="gfx2", start="GFX2_START", width=16, no_offset=true },
    { name="gfx3", start="GFX3_START", width=16, no_offset=true }
]

order = [
    "maincpu", "audiocpu", "gfx1", "gfx2", "gfx3"
]
