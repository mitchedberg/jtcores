params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
sdram:
  banks:
    - buses:
      - name: main
        addr_width: 18
        data_width: 16
      - name: ram
        addr_width: 16
        data_width: 16
        rw: true
        offset: RAM_OFFSET
    - buses:
      - name: snd
        addr_width: 16
        data_width: 8
    - buses:
      - name: obj
        addr_width: 20
        data_width: 32
bram:
  - name: pal
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: mp_dout }
