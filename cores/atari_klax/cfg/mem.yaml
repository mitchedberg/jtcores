params:
  - { name: RAM_OFFSET, value: "19'h40000" }
sdram:
  banks:
    - buses:
      - name: main
        addr_width: 20
        data_width: 16
    - buses:
      - name: snd
        addr_width: 16
        data_width: 8
    - buses:
      - name: gfx0
        addr_width: 20
        data_width: 8
    - buses:
      - name: gfx1
        addr_width: 19
        data_width: 8
bram:
  - name: ram
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: ram_we, rw: true, din: ram_din, dout: ram_dout }
  - name: vram0
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: vram0_we, rw: true, din: ram_din, dout: vram0_dout }
  - name: vram1
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: vram1_we, rw: true, din: ram_din, dout: vram1_dout }
  - name: spr
    addr_width: 11
    data_width: 16
    dual_port: { name: main, we: spr_we, rw: true, din: ram_din, dout: spr_dout }
  - name: pal
    addr_width: 10
    data_width: 8
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: pal_dout }
