[global]
author=["community"]

[parse]
sourcefile=[ "klax.cpp" ]

[buttons]
names=[
    { names="Fire" }
]

[dipsw]
delete=[{names=["Unused","Unknown"]}]

[ROM]
regions = [
    { name="maincpu", width=16, reverse=true, no_offset=true },
    { name="gfx1", start="JTFRAME_BA2_START", width=8 },
    { name="gfx2", start="JTFRAME_BA3_START", width=8 },
    { name="oki", start="JTFRAME_BA1_START", width=8 }
]

order = [
    "maincpu", "oki", "gfx1", "gfx2"
]
