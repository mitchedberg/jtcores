params:
  - { name: RAM_OFFSET, value: "20'h04_0000" }
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 17
        data_width: 16
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 19
        data_width: 16
    - buses:
      - name: snd
        addr_width: 15
        data_width: 8
      - name: adpcm
        addr_width: 19
        data_width: 8
    - buses:
      - name: vram0
        addr_width: 19
        data_width: 16
    - buses:
      - name: vram1
        addr_width: 16
        data_width: 8
bram:
  - name: pal
    addr_width: 11
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: mp_dout }
