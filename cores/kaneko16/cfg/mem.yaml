params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 16
        data_width: 16
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 18
        data_width: 16
    - buses:
      - name: oki
        addr_width: 18
        data_width: 8
    - buses:
      - name: gfx
        addr_width: 20
        data_width: 32
