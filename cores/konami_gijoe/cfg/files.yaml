konami_gijoe:
  - get:
    - jtgijoe_game.v
    - jtgijoe_main.v
    - jtgijoe_snd.v
jtframe:
  - get:
    - jtframe_edge.v
  - from: video
    get:
      - jtframe_vtimer.v
      - jtframe_blank.v
  - from: cpu
    get:
      - jtframe_m68k.yaml
      - jtframe_z80.yaml
  - from: ram
    get:
      - jtframe_dual_ram.v
      - jtframe_dual_ram16.v
      - jtframe_obj_buffer.v
  - from: clocking
    get:
      - jtframe_frac_cen.v

