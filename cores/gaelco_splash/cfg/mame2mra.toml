[global]
author=["community"]

[parse]
sourcefile=[ "splash.cpp" ]

[buttons]
names=[
    { names="Fire 1,Fire 2" }
]

[dipsw]
delete=[{names=["Unused","Unknown"]}]

[ROM]
regions = [
    { name="maincpu", width=16, reverse=true, no_offset=true },
    { name="audiocpu", start="JTFRAME_BA1_START" },
    { name="gfx1", start="JTFRAME_BA2_START", width=16, no_offset=true },
    { name="gfx2", start="JTFRAME_BA2_START", width=16, no_offset=true }
]

order = [
    "maincpu", "audiocpu", "gfx1", "gfx2"
]
