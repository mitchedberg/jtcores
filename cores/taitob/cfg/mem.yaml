params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
  - { name: PCM_OFFSET, value: "(`ADPCMA_START-`JTFRAME_BA1_START)>>1" }
clocks:
  clk:
    - freq: 4M
      outputs: [cen4, cen2]
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 15
        data_width: 16
        din: main_dout
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 19
        data_width: 16
    - buses:
      - name: snd
        addr_width: 16
        data_width: 8
      - name: pcm
        addr_width: 19
        data_width: 8
        offset: PCM_OFFSET
    - buses:
      - name: txt
        addr_width: 17
        data_width: 32
      - name: gfx
        addr_width: 20
        data_width: 32
    - buses:
      - name: obj
        addr_width: 20
        data_width: 32
bram:
  - name: vram
    addr_width: 16
    data_width: 16
    sim_file: true
    dual_port:
      name: main
      addr: "vcu_cpu_addr_w"
      we: vram_we
      rw: true
      din: main_dout
  - name: spram
    addr_width: 14
    data_width: 16
    sim_file: true
    dual_port:
      name: main
      addr: "vcu_cpu_addr_w[13:1]"
      we: spram_we
      rw: true
      din: main_dout
  - name: scram
    addr_width: 11
    data_width: 16
    sim_file: true
    dual_port:
      name: main
      addr: "vcu_cpu_addr_w[10:1]"
      we: scram_we
      rw: true
      din: main_dout
  - name: pal
    addr_width: 13
    data_width: 16
    sim_file: true
    ioctl: { save: true, order: 0 }
    dual_port:
      name: main
      addr: "cpu_addr_o_w[12:1]"
      we: pal_we
      rw: true
      din: main_dout
