params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
sdram:
  banks:
    - buses:
      - name: ram
        addr_width: 17
        data_width: 16
        rw: true
        offset: RAM_OFFSET
      - name: main
        addr_width: 20
        data_width: 16
    - buses:
      - name: snd
        addr_width: 17
        data_width: 8
    - buses:
      - name: gfx2
        addr_width: 23
        data_width: 32
    - buses:
      - name: gfx3
        addr_width: 22
        data_width: 32
bram:
  - name: spr
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: spr_we, rw: true, din: ram_din, dout: ms_dout }
  - name: pal
    addr_width: 12
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: mp_dout }
  - name: vram0
    addr_width: 11
    data_width: 16
    dual_port: { name: main, we: vram0_we, rw: true, din: ram_din, dout: m0_dout }
  - name: vram1
    addr_width: 11
    data_width: 16
    dual_port: { name: main, we: vram1_we, rw: true, din: ram_din, dout: m1_dout }
