params:
  - { name: RAM_OFFSET, value: "22'h10_0000" }
sdram:
  banks:
    - buses:
      - name: main
        addr_width: 20
        data_width: 16
    - buses:
      - name: snd
        addr_width: 17
        data_width: 8
    - buses:
      - name: gfx
        addr_width: 21
        data_width: 32
bram:
  - name: spr
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: spr_we, rw: true, din: ram_din, dout: ms_dout }
  - name: pal
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: pal_we, rw: true, din: ram_din, dout: mp_dout }
  - name: vram
    addr_width: 13
    data_width: 16
    dual_port: { name: main, we: vram_we, rw: true, din: ram_din, dout: mv_dout }
