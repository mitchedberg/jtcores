name: Build jtbubl

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'cores/bubl/**'
      - '.github/workflows/build-bubl.yaml'

jobs:
  compile_bubl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
      - name: Init public submodules only
        run: |
          # Init submodules one by one, skip private ones
          for mod in modules/fx68k modules/jt12 modules/jt51 modules/jt5205 modules/jtkcpu modules/jtopl modules/jtframe; do
            echo "=== Initializing $mod ==="
            git submodule update --init "$mod" 2>&1 || echo "SKIPPED $mod (probably private)"
          done
          # Init nested submodules in jt12
          cd modules/jt12 && git submodule update --init --recursive 2>&1 || true
          cd ../..
          # Verify key files
          echo "=== Verification ==="
          ls -la modules/jtframe/hdl/sdram/jtframe_sdram64.v && echo "jtframe OK"
          ls -la modules/jt12/cfg/jt03.yaml && echo "jt12 OK"
          ls -la modules/jt12/jt49/hdl/jt49.v && echo "jt49 OK"
          ls -la modules/jtopl/cfg/jt26.yaml && echo "jtopl OK"
      - id: compile
        run: |
          docker run --network host -v $(pwd):/jtcores jotego/jtcore20 /jtcores/modules/jtframe/devops/xjtcore.sh bubl mister
      - uses: actions/upload-artifact@v4
        with:
          name: jtbubl-rebuilt
          path: release
          retention-days: 7
