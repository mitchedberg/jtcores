name: Build jtbubl

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'cores/bubl/**'
      - '.github/workflows/build-bubl.yaml'

jobs:
  compile_bubl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - id: compile
        run: |
          docker run --network host -v $(pwd):/jtcores jotego/jtcore20 /jtcores/modules/jtframe/devops/xjtcore.sh bubl mister
      - uses: actions/upload-artifact@v4
        with:
          name: jtbubl-rebuilt
          path: release
          retention-days: 7
