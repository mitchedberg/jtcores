name: Rastan MiSTer Control Build

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/rastan_mister_control.yaml
  workflow_dispatch:

jobs:
  build-rastan-mister:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init public submodules only
        run: |
          git submodule init
          git config submodule.modules/jtframe/target/pocket.update none
          git config submodule.cores/cps3.update none
          git submodule update --init --recursive --depth=1

      - name: Build stock Rastan for MiSTer
        run: |
          docker run \
            -e BETAKEY=${{ secrets.BETAKEY }} \
            --network host \
            -v `pwd`:/jtcores \
            jotego/jtcore20 \
            /jtcores/modules/jtframe/devops/xjtcore.sh rastan mister

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rastan-mister-release
          path: release
          retention-days: 7
